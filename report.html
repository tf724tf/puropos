<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PURO 銷售報表</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      background: #f5f5f5;
      color: #222;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }

    h1 {
      margin: 0 0 18px;
      font-size: 36px;
    }

    .top-link {
      display: inline-block;
      margin-bottom: 18px;
      font-size: 16px;
      text-decoration: none;
      color: #333;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }

    .card-title {
      font-size: 18px;
      color: #666;
      margin-bottom: 10px;
    }

    .card-value {
      font-size: 32px;
      font-weight: 900;
    }

    .card-sub {
      margin-top: 8px;
      color: #666;
      font-size: 15px;
    }

    .section {
      background: white;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }

    .section h2 {
      margin: 0 0 16px;
      font-size: 26px;
    }

    .filters {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
      align-items: center;
    }

    .filters input,
    .filters select {
      padding: 12px;
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid #ccc;
      background: white;
    }

    .filters button {
      padding: 12px 18px;
      font-size: 16px;
      border-radius: 10px;
      border: none;
      background: black;
      color: white;
      cursor: pointer;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 12px 10px;
      border-bottom: 1px solid #eee;
      text-align: left;
      vertical-align: top;
      font-size: 15px;
    }

    th {
      background: #fafafa;
    }

    .item-line {
      margin: 2px 0;
    }

    .status-tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .status-done {
      background: #e8f7e8;
      color: #0f7a0f;
    }

    .status-refunded {
      background: #fff3d9;
      color: #9a6700;
    }

    .status-deleted {
      background: #fde7e7;
      color: #b42318;
    }

    .reason {
      color: #b42318;
      margin-top: 6px;
      line-height: 1.5;
    }

    .muted {
      color: #777;
    }

    @media (max-width: 900px) {
      .cards {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="top-link" href="/admin.html">← 回櫃檯後台</a>
    <h1>📊 銷售報表 / 歷史訂單</h1>

    <div class="section">
      <h2>📅 月份查詢</h2>
      <div class="filters">
        <input type="month" id="month-picker" />
        <button onclick="loadMonthData()">查詢月份</button>
        <button onclick="exportExcel()">匯出 Excel</button>
      </div>
    </div>

    <div class="cards">
      <div class="card">
        <div class="card-title">今日營業額</div>
        <div class="card-value" id="today-total">$0</div>
        <div id="today-count" class="card-sub">0 筆</div>
      </div>

      <div class="card">
        <div class="card-title">查詢月份營業額</div>
        <div class="card-value" id="month-total">$0</div>
        <div id="month-count" class="card-sub">0 筆</div>
      </div>

      <div class="card">
        <div class="card-title">查詢月份 Pizza 銷售</div>
        <div class="card-value" id="month-pizza-count">0 張</div>
        <div id="month-label" class="card-sub">尚未查詢</div>
      </div>

      <div class="card">
        <div class="card-title">本年營業額</div>
        <div class="card-value" id="year-total">$0</div>
        <div id="year-count" class="card-sub">0 筆</div>
      </div>
    </div>

    <div class="section">
      <h2>🔥 熱銷商品排行（依查詢月份）</h2>
      <table>
        <thead>
          <tr>
            <th>排名</th>
            <th>品項</th>
            <th>尺寸</th>
            <th>銷售數量</th>
            <th>銷售額</th>
          </tr>
        </thead>
        <tbody id="item-rank-body"></tbody>
      </table>
    </div>

    <div class="section">
      <h2>🧾 歷史交易列表</h2>

      <div class="filters">
        <input type="date" id="date-from" />
        <input type="date" id="date-to" />
        <input type="text" id="keyword" placeholder="搜尋單號或品項" />
        <select id="status-filter">
          <option value="">全部狀態</option>
          <option value="done">完成</option>
          <option value="refunded">退單</option>
          <option value="deleted">刪單</option>
          <option value="pending">未收款</option>
          <option value="making">製作中</option>
          <option value="waiting">排隊中</option>
        </select>
        <button onclick="loadHistory()">查詢</button>
      </div>

      <table>
        <thead>
          <tr>
            <th>單號</th>
            <th>時間</th>
            <th>內容</th>
            <th>金額</th>
            <th>狀態 / 原因</th>
          </tr>
        </thead>
        <tbody id="history-body"></tbody>
      </table>
    </div>
  </div>

  <script>
    function money(n) {
      return "$" + Number(n || 0);
    }

    function formatTime(ts) {
      if (!ts) return "-";
      const d = new Date(ts);
      return d.toLocaleString("zh-TW");
    }

    function getSelectedMonth() {
      return document.getElementById("month-picker").value;
    }

    function statusHtml(row) {
      const map = {
        done: ["完成", "status-done"],
        refunded: ["退單", "status-refunded"],
        deleted: ["刪單", "status-deleted"],
        pending: ["未收款", ""],
        making: ["製作中", ""],
        waiting: ["排隊中", ""]
      };

      const config = map[row.status] || [row.status, ""];
      const [label, cls] = config;

      return `
        <div class="status-tag ${cls}">${label}</div>
        ${row.deleteReason ? `<div class="reason">原因：${row.deleteReason}</div>` : ""}
        ${row.deletedAt ? `<div class="muted">處理時間：${formatTime(row.deletedAt)}</div>` : ""}
      `;
    }

    async function loadFixedSummary() {
      const today = await fetch("/report/today").then(r => r.json());
      const year = await fetch("/report/year").then(r => r.json());

      document.getElementById("today-total").innerText = money(today.total);
      document.getElementById("today-count").innerText = `${today.orderCount || 0} 筆`;

      document.getElementById("year-total").innerText = money(year.total);
      document.getElementById("year-count").innerText = `${year.orderCount || 0} 筆`;
    }

    async function loadMonthData() {
      const month = getSelectedMonth();
      const summary = await fetch(`/report/monthly-summary?month=${encodeURIComponent(month)}`).then(r => r.json());
      const items = await fetch(`/report/items?month=${encodeURIComponent(month)}`).then(r => r.json());

      document.getElementById("month-total").innerText = money(summary.total);
      document.getElementById("month-count").innerText = `${summary.orderCount || 0} 筆`;
      document.getElementById("month-pizza-count").innerText = `${summary.pizzaCount || 0} 張`;
      document.getElementById("month-label").innerText = summary.month || "尚未查詢";

      const body = document.getElementById("item-rank-body");

      if (!items.length) {
        body.innerHTML = `<tr><td colspan="5" class="muted">這個月份目前沒有完成訂單資料</td></tr>`;
        return;
      }

      body.innerHTML = items.map((row, index) => `
        <tr>
          <td>${index + 1}</td>
          <td>${row.item}</td>
          <td>${row.size}</td>
          <td>${row.qty}</td>
          <td>${money(row.total)}</td>
        </tr>
      `).join("");
    }

    async function loadHistory() {
      const dateFrom = document.getElementById("date-from").value;
      const dateTo = document.getElementById("date-to").value;
      const keyword = document.getElementById("keyword").value.trim();
      const statusFilter = document.getElementById("status-filter").value;
      const month = getSelectedMonth();

      const params = new URLSearchParams();
      if (dateFrom) params.append("dateFrom", dateFrom);
      if (dateTo) params.append("dateTo", dateTo);
      if (keyword) params.append("keyword", keyword);
      if (statusFilter) params.append("status", statusFilter);
      if (month) params.append("month", month);

      const rows = await fetch("/report/history?" + params.toString()).then(r => r.json());
      const body = document.getElementById("history-body");

      if (!rows.length) {
        body.innerHTML = `<tr><td colspan="5" class="muted">查無資料</td></tr>`;
        return;
      }

      body.innerHTML = rows.map(row => `
        <tr>
          <td>${row.id}</td>
          <td>${formatTime(row.createdAt)}</td>
          <td>
            ${(row.items || []).map(item => `
              <div class="item-line">- ${item.name}｜${item.size}｜${money(item.price)}</div>
            `).join("")}
          </td>
          <td>${money(row.price)}</td>
          <td>${statusHtml(row)}</td>
        </tr>
      `).join("");
    }

    function exportExcel() {
      const dateFrom = document.getElementById("date-from").value;
      const dateTo = document.getElementById("date-to").value;
      const keyword = document.getElementById("keyword").value.trim();
      const statusFilter = document.getElementById("status-filter").value;
      const month = getSelectedMonth();

      const params = new URLSearchParams();
      if (dateFrom) params.append("dateFrom", dateFrom);
      if (dateTo) params.append("dateTo", dateTo);
      if (keyword) params.append("keyword", keyword);
      if (statusFilter) params.append("status", statusFilter);
      if (month) params.append("month", month);

      window.open("/report/export?" + params.toString(), "_blank");
    }

    function setDefaultMonth() {
      const now = new Date();
      const value = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}`;
      document.getElementById("month-picker").value = value;
    }

    setDefaultMonth();
    loadFixedSummary();
    loadMonthData();
    loadHistory();
  </script>
</body>
</html>
