<!DOCTYPE html>
<html>
<body>

<script>
if(prompt("密碼")!=="7929"){
  alert("錯誤");
  location.reload();
}
</script>

<h2>報表</h2>
<div id="data"></div>

<script>

async function load(){
  const res=await fetch("/orders");
  const data=await res.json();

  let total=0;

  data.forEach(o=>{
    if(o.status==="done"){
      total+=o.price;
    }
  });

  document.getElementById("data").innerHTML="總營業額："+total;
}

load();

</script>

</body>
</html>
