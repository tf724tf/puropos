<!DOCTYPE html>
<html>
<body>

<h2>POS後台</h2>

<button onclick="logout()">登出</button>
<button onclick="load()">刷新</button>

<h3>今日錢櫃：<span id="cash">0</span></h3>

<div id="list"></div>

<script>

if(!sessionStorage.getItem("admin_auth_token")){
  location.href="/admin-login.html";
}

window.addEventListener("pagehide",()=>{
  sessionStorage.removeItem("admin_auth_token");
});

function logout(){
  sessionStorage.removeItem("admin_auth_token");
  location.href="/admin-login.html";
}

function money(n){return "$"+n}

async function load(){
  const res = await fetch("/orders");
  const data = await res.json();

  let html="";
  let cash=0;

  data.forEach(o=>{
    if(o.paidAmount){
      cash += o.paidAmount - o.changeAmount;
    }

    html+=`
      <div style="border:1px solid #ccc;margin:10px;padding:10px">
        <b>${o.id}</b> (${o.orderType})<br>
        ${o.items.map(i=>i.name+" "+i.size).join("<br>")}
        <br>金額:${o.price}

        <br><button onclick="pay('${o.id}',${o.price})">收款</button>
        <button onclick="done('${o.id}')">完成</button>
      </div>
    `;
  });

  document.getElementById("list").innerHTML=html;
  document.getElementById("cash").innerText=money(cash);
}

async function pay(id,price){
  const paid = prompt("收多少");
  await fetch("/pay/"+id,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({paidAmount:Number(paid)})
  });
  load();
}

async function done(id){
  await fetch("/done/"+id,{method:"POST"});
  load();
}

load();
</script>

</body>
</html>
