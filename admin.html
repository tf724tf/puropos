<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PURO POS 後台</title>
  <style>
    :root{
      --bg:#f6f4ef;
      --card:#ffffff;
      --text:#1f1f1f;
      --muted:#6b7280;
      --line:#e5e7eb;
      --primary:#111111;
      --green:#1f9d55;
      --blue:#2563eb;
      --orange:#f59e0b;
      --danger:#dc2626;
      --accent:#c95a00;
      --shadow:0 8px 24px rgba(0,0,0,0.06);
    }
    *{box-sizing:border-box;}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      margin:0;
      background:var(--bg);
      color:var(--text);
    }
    .wrap{
      max-width:1200px;
      margin:auto;
      padding:20px;
    }
    h1{margin:0 0 12px;font-size:28px;}
    h2{margin:0 0 12px;font-size:22px;}
    h3{margin:0 0 12px;font-size:20px;}
    .topbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:16px;
    }
    .btn,.pay-btn,.done-btn,.delete-btn,.edit-btn,.small-btn{
      border:none;
      border-radius:10px;
      padding:8px 14px;
      min-height:44px;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }
    .btn,.small-btn{background:var(--primary);color:#fff;}
    .pay-btn{background:var(--green);color:#fff;}
    .done-btn{background:var(--blue);color:#fff;}
    .delete-btn{background:var(--danger);color:#fff;}
    .edit-btn{background:var(--orange);color:#fff;}
    .section{
      background:var(--card);
      padding:18px;
      border-radius:16px;
      margin-bottom:16px;
      box-shadow:var(--shadow);
    }
    .dashboard{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:12px;
      margin-bottom:16px;
    }
    .stat-card{
      background:var(--card);
      border-radius:16px;
      padding:16px;
      box-shadow:var(--shadow);
    }
    .stat-label{color:var(--muted);font-size:14px;margin-bottom:6px;}
    .stat-value{font-size:28px;font-weight:900;color:var(--accent);}
    .start-cash-input,
    input,select,textarea{
      width:100%;
      padding:10px;
      border-radius:10px;
      border:1px solid #d1d5db;
      font-size:15px;
      background:#fff;
    }
    textarea{min-height:90px;resize:vertical;}
    .start-cash-note{margin-top:8px;font-size:12px;color:var(--muted);}
    .order{
      border-bottom:1px solid var(--line);
      padding:12px 0;
    }
    .order:last-child{border-bottom:none;}
    .order-id{font-size:18px;font-weight:800;margin-bottom:6px;}
    .item-line{font-size:15px;margin:3px 0;}
    .meta-line{font-size:14px;color:var(--muted);margin:4px 0;}
    .price{color:var(--accent);font-weight:900;font-size:22px;margin:6px 0;}
    .action-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
    .empty-text{color:#777;font-size:14px;padding:6px 0;}

    .grid-2{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      margin-top:12px;
    }
    th,td{
      text-align:left;
      padding:10px 8px;
      border-bottom:1px solid #eee;
      vertical-align:top;
      font-size:14px;
    }
    th{background:#fafafa;}

    .modal-bg{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.45);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:9999;
      padding:16px;
    }
    .modal{
      width:min(920px,92vw);
      max-height:90vh;
      overflow:auto;
      background:white;
      border-radius:18px;
      padding:20px;
    }
    .editor-row{
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px;
      margin-bottom:12px;
    }
    .editor-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:10px;
    }
    .remove-item-btn{background:var(--danger);}
    .total-box{
      font-size:22px;
      font-weight:900;
      color:var(--accent);
      margin-top:10px;
    }

    @media(max-width:980px){
      .dashboard{grid-template-columns:repeat(2,1fr);}
      .grid-2{grid-template-columns:1fr;}
    }
    @media(max-width:760px){
      .dashboard{grid-template-columns:1fr;}
      .btn,.pay-btn,.done-btn,.delete-btn,.edit-btn,.small-btn{width:100%;}
    }
  
  #num-pad{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
  margin-top:16px;
}

#num-pad button{
  height:90px;
  font-size:28px;
  font-weight:900;
  border-radius:18px;
  border:none;
  background:#111;
  color:#fff;
}

#num-pad button:active{
  transform:scale(0.95);
  background:#333;
}
    /* 快捷金額（100/500/1000/剛好） */
.pay-quick-row{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:16px;
  margin-top:16px;
}

.pay-quick-row button{
  min-height:80px;
  font-size:26px;
  font-weight:900;
  border:none;
  border-radius:18px;
  background:#16a34a; /* 綠色 */
  color:#fff;
  width:100%;
}

/* 收款 / 取消按鈕 */
.pay-action-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
  margin-top:20px;
}

.pay-action-row button{
  min-height:90px;
  font-size:30px;
  font-weight:900;
  border:none;
  border-radius:18px;
  width:100%;
}
</style>
</head>
<body>

<div class="wrap">
  <div class="topbar">
    <button type="button" class="btn" onclick="logout()">登出</button>
    <button type="button" class="btn" onclick="loadOrders(true)">刷新</button>
    <a href="/order.html" target="_blank" class="btn">客人點餐頁</a>
    <a href="/report.html" target="_blank" class="btn">銷售報表</a>
  </div>

  <h1>PURO POS 後台</h1>

  <div class="dashboard">
    <div class="stat-card">
      <div class="stat-label">開店起始金額</div>
      <input
        id="start-cash"
        class="start-cash-input"
        type="number"
        placeholder="輸入開店金額"
        oninput="updateStartCash()"
      />
      <div class="start-cash-note">會暫存在本機瀏覽器</div>
    </div>

    <div class="stat-card">
      <div class="stat-label">今日錢櫃金額</div>
      <div class="stat-value" id="cash-drawer-total">$0</div>
    </div>

    <div class="stat-card">
      <div class="stat-label">今日已收款訂單</div>
      <div class="stat-value" id="paid-order-count">0</div>
    </div>

    <div class="stat-card">
      <div class="stat-label">今日已收現金總額</div>
      <div class="stat-value" id="paid-amount-total">$0</div>
    </div>
  </div>

  <div class="section">
    <h2>未收款</h2>
    <div id="pending"></div>
  </div>

  <div class="section">
    <h2>製作中（前4單）</h2>
    <div id="making"></div>
  </div>

  <div class="section">
    <h2>排隊中</h2>
    <div id="waiting"></div>
  </div>

  <div class="section">
    <h2>完成（僅今日）</h2>
    <div id="done"></div>
  </div>

  <div class="section">
    <h2>分類管理</h2>
    <div class="grid-2">
      <input id="category-name" placeholder="分類名稱（例如：甜點）">
      <input id="category-slug" placeholder="slug（例如：dessert）">
      <input id="category-sort-order" type="number" placeholder="排序">
      <label style="display:flex; align-items:center; gap:8px;">
        <input id="category-is-active" type="checkbox" checked style="width:auto;">
        啟用中
      </label>
    </div>

    <div class="pay-action-row">
      <button class="small-btn" onclick="saveCategory()">儲存分類</button>
      <button class="small-btn" onclick="resetCategoryForm()">清空表單</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>名稱</th>
          <th>slug</th>
          <th>排序</th>
          <th>狀態</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="category-table-body"></tbody>
    </table>
  </div>

  <div class="section">
    <h2>商品管理</h2>

    <div class="grid-2">
      <input id="product-name" placeholder="商品名稱">
      <select id="product-category"></select>
      <input id="product-price" type="number" placeholder="一般價格 / 飲料價格">
      <input id="product-sort-order" type="number" placeholder="排序（越小越前面）">
      <input id="product-price-square" type="number" placeholder="方形價格（pizza 用）">
      <input id="product-price-round" type="number" placeholder="圓形價格（pizza 用）">
      <label style="display:flex; align-items:center; gap:8px;">
        <input id="product-is-active" type="checkbox" checked style="width:auto;">
        上架中
      </label>
      <div></div>
    </div>

    <div style="margin-top:12px;">
      <textarea id="product-description" placeholder="商品描述"></textarea>
    </div>

    <div class="editor-actions">
      <button class="small-btn" onclick="saveProduct()">儲存商品</button>
      <button class="small-btn" onclick="resetProductForm()">清空表單</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>名稱</th>
          <th>分類</th>
          <th>價格</th>
          <th>描述</th>
          <th>排序</th>
          <th>狀態</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="product-table-body"></tbody>
    </table>
  </div>
</div>

<div id="modal-bg" class="modal-bg">
  <div class="modal">
    <h3>修改訂單</h3>
    <label>內用 / 外帶</label>
    <select id="edit-order-type">
      <option value="內用">內用</option>
      <option value="外帶">外帶</option>
    </select>

    <div id="editor-list"></div>
    <div class="editor-actions">
      <button type="button" class="small-btn" onclick="addEditorRow('pizza')">+ 加 Pizza</button>
      <button type="button" class="small-btn" onclick="addEditorRow('drink')">+ 加 飲料/冰淇淋</button>
      <button type="button" class="small-btn" onclick="saveEdit()">儲存修改</button>
      <button type="button" class="small-btn" onclick="closeModal()">取消</button>
    </div>
    <div class="total-box">總價：<span id="editor-total">$0</span></div>
  </div>
</div>

<div id="pay-modal-bg" class="modal-bg">
  <div class="modal">
    <h3>收款計算</h3>
    <div class="grid-2">
      <div>
        <div class="meta-line">訂單金額</div>
        <div class="price" id="pay-order-total-text">$0</div>
        <input id="pay-order-total" type="number" readonly>
        <div class="meta-line">實收金額</div>
       <input id="pay-paid-amount" type="text" readonly placeholder="點擊下面鍵盤輸入">

<div id="num-pad">
  <button onclick="numPress(7)">7</button>
  <button onclick="numPress(8)">8</button>
  <button onclick="numPress(9)">9</button>

  <button onclick="numPress(4)">4</button>
  <button onclick="numPress(5)">5</button>
  <button onclick="numPress(6)">6</button>

  <button onclick="numPress(1)">1</button>
  <button onclick="numPress(2)">2</button>
  <button onclick="numPress(3)">3</button>

  <button onclick="numPress(0)">0</button>
  <button onclick="clearNum()">清除</button>
  <button onclick="backspace()">←</button>
</div>

<div class="pay-quick-row">
  <button onclick="setQuickCash(100)">100</button>
  <button onclick="setQuickCash(500)">500</button>
  <button onclick="setQuickCash(1000)">1000</button>
  <button onclick="setExact()">剛好</button>
</div>
        </div>
        <div class="price">找零：<span id="pay-change-result">$0</span></div>
        <div class="editor-actions">
          <button type="button" class="small-btn" onclick="confirmPay()">確認收款</button>
          <button type="button" class="small-btn" onclick="closePayModal()">取消</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/menu.js"></script>
<script>
const ADMIN_TOKEN = sessionStorage.getItem("admin_auth_token");

if (!ADMIN_TOKEN) {
  window.location.href = "/admin-login.html";
}

const MENU = window.PURO_MENU;
let currentEditingId = null;
let currentPayId = null;
let currentPayTotal = 0;
let startCash = Number(localStorage.getItem("start_cash") || 0);
let editingProductId = null;
let editingCategoryId = null;
let adminCategories = [];

async function adminFetch(url, options = {}) {
  const finalOptions = {
    ...options,
    headers: {
      "Content-Type": "application/json",
      ...(options.headers || {}),
      "x-admin-token": ADMIN_TOKEN
    }
  };

  const res = await fetch(url, finalOptions);

  if (res.status === 401) {
    sessionStorage.removeItem("admin_auth_token");
    window.location.href = "/admin-login.html";
    throw new Error("未授權");
  }

  return res;
}

function logout() {
  sessionStorage.removeItem("admin_auth_token");
  window.location.href = "/admin-login.html";
}

function formatMoney(n){
  return "$" + Number(n || 0).toLocaleString("zh-TW");
}

function updateStartCash(){
  const val = Number(document.getElementById("start-cash").value || 0);
  startCash = val;
  localStorage.setItem("start_cash", val);
  loadOrders();
}

function renderItems(items){
  return (items || []).map(i => `<div class="item-line">${i.name} ${i.size} $${i.price}</div>`).join("");
}

function buildOrderHtml(o, type){
  let buttons = "";
  if(type === "pending"){
    buttons = `
      <div class="action-row">
        <button type="button" class="pay-btn" onclick="openPayModal('${o.id}', ${o.price})">收款</button>
        <button type="button" class="edit-btn" onclick="openEditModal('${o.id}')">修改</button>
        <button type="button" class="delete-btn" onclick="deleteOrder('${o.id}')">刪除</button>
      </div>
    `;
  }
  if(type === "making"){
    buttons = `
      <div class="action-row">
        <button type="button" class="done-btn" onclick="doneOrder('${o.id}')">完成</button>
      </div>
    `;
  }
  return `
    <div class="order">
      <div class="order-id">${o.id}</div>
      <div class="meta-line">類型：${o.orderType || "內用"}</div>
      ${renderItems(o.items)}
      <div class="price">$${o.price || 0}</div>
      ${buttons}
    </div>
  `;
}

function getTodayStart() {
  const d = new Date();
  d.setHours(0,0,0,0);
  return d.getTime();
}

function updateCashDrawerStats(orders){
  const todayStart = getTodayStart();
  const paidTodayOrders = orders.filter(o =>
    (o.createdAt || 0) >= todayStart &&
    o.status !== "deleted" &&
    Number(o.paidAmount || 0) > 0
  );

  const todayCash = paidTodayOrders.reduce((sum, o) => {
    return sum + (Number(o.paidAmount || 0) - Number(o.changeAmount || 0));
  }, 0);

  const cashDrawerTotal = startCash + todayCash;

  const paidAmountTotal = paidTodayOrders.reduce((sum, o) => {
    return sum + Number(o.paidAmount || 0);
  }, 0);

  document.getElementById("cash-drawer-total").innerText = formatMoney(cashDrawerTotal);
  document.getElementById("paid-order-count").innerText = String(paidTodayOrders.length);
  document.getElementById("paid-amount-total").innerText = formatMoney(paidAmountTotal);
}

async function loadOrders(showMessage = false){
  try {
    const res = await adminFetch("/orders?_t=" + Date.now(), { cache: "no-store" });
    const orders = await res.json();

    const todayStart = getTodayStart();

    const pendingOrders = orders.filter(o => o.status === "pending").sort((a, b) => a.createdAt - b.createdAt);
    const makingOrders = orders.filter(o => o.status === "making").sort((a, b) => a.createdAt - b.createdAt);
    const waitingOrders = orders.filter(o => o.status === "waiting").sort((a, b) => a.createdAt - b.createdAt);
    const doneOrders = orders
      .filter(o => o.status === "done" && (o.completedAt || 0) >= todayStart)
      .sort((a, b) => (b.completedAt || 0) - (a.completedAt || 0));

    document.getElementById("pending").innerHTML =
      pendingOrders.length ? pendingOrders.map(o => buildOrderHtml(o, "pending")).join("") : `<div class="empty-text">目前沒有未收款訂單</div>`;

    document.getElementById("making").innerHTML =
      makingOrders.length ? makingOrders.map(o => buildOrderHtml(o, "making")).join("") : `<div class="empty-text">目前沒有製作中訂單</div>`;

    document.getElementById("waiting").innerHTML =
      waitingOrders.length ? waitingOrders.map(o => buildOrderHtml(o, "waiting")).join("") : `<div class="empty-text">目前沒有排隊中訂單</div>`;

    document.getElementById("done").innerHTML =
      doneOrders.length ? doneOrders.map(o => buildOrderHtml(o, "done")).join("") : `<div class="empty-text">今天還沒有完成訂單</div>`;

    document.getElementById("start-cash").value = startCash;
    updateCashDrawerStats(orders);

    if (showMessage) console.log("已刷新");
  } catch (err) {
    console.error("刷新失敗", err);
    alert("刷新失敗，請稍後再試");
  }
}

function openPayModal(id, total){
  currentPayId = id;
  currentPayTotal = Number(total || 0);
  document.getElementById("pay-order-total").value = currentPayTotal;
  document.getElementById("pay-order-total-text").innerText = formatMoney(currentPayTotal);
  document.getElementById("pay-paid-amount").value = "";
  document.getElementById("pay-change-result").innerText = "$0";
  document.getElementById("pay-modal-bg").style.display = "flex";
}

function closePayModal(){
  document.getElementById("pay-modal-bg").style.display = "none";
  currentPayId = null;
  currentPayTotal = 0;
}

function updateChange(){
  const paid = Number(document.getElementById("pay-paid-amount").value || 0);
  const change = Math.max(0, paid - currentPayTotal);
  document.getElementById("pay-change-result").innerText = formatMoney(change);
}

function setQuickCash(amount){
  document.getElementById("pay-paid-amount").value = Number(amount || 0);
  updateChange();
}
function numPress(n){
  const input = document.getElementById("pay-paid-amount");
  input.value = String(input.value || "") + String(n);
  updateChange();
}

function clearNum(){
  document.getElementById("pay-paid-amount").value = "";
  updateChange();
}

function backspace(){
  const input = document.getElementById("pay-paid-amount");
  input.value = String(input.value || "").slice(0, -1);
  updateChange();
}

function setExact(){
  document.getElementById("pay-paid-amount").value = String(currentPayTotal || 0);
  updateChange();
}
async function confirmPay(){
  const paidAmount = Number(document.getElementById("pay-paid-amount").value || 0);
  if (!paidAmount || paidAmount < currentPayTotal) {
    alert("收款金額不足");
    return;
  }

  const res = await adminFetch("/pay/" + currentPayId, {
    method:"POST",
    body: JSON.stringify({ paidAmount })
  });

  const data = await res.json();
  if (!res.ok) {
    alert(data.error || "收款失敗");
    return;
  }

  closePayModal();
  loadOrders();
}

async function doneOrder(id){
  await adminFetch("/done/" + id, { method:"POST" });
  loadOrders();
}

async function deleteOrder(id){
  const reason = prompt("請輸入刪除原因（必填）", "");
  if (reason === null) return;
  const finalReason = reason.trim();
  if (!finalReason) {
    alert("刪單一定要填原因");
    return;
  }

  await adminFetch("/delete/" + id, {
    method: "POST",
    body: JSON.stringify({ reason: finalReason })
  });

  loadOrders();
}

function createPizzaRowHtml(item = null){
  const pizzaOptions = MENU.pizzas.map(p =>
    `<option value="${p.id}" ${item && item.menuId === p.id ? "selected" : ""}>${p.name}</option>`
  ).join("");

  const size = item?.size || "方形";

  return `
    <div class="editor-row" data-type="pizza">
      <label>Pizza 口味</label>
      <select class="pizza-select" onchange="refreshRowPrice(this.closest('.editor-row'))">
        ${pizzaOptions}
      </select>

      <label>尺寸</label>
      <select class="pizza-size" onchange="refreshRowPrice(this.closest('.editor-row'))">
        <option value="方形" ${size === "方形" ? "selected" : ""}>方形</option>
        <option value="圓形" ${size === "圓形" ? "selected" : ""}>圓形</option>
      </select>

      <label>價格</label>
      <input class="row-price" type="number" value="${item?.price || 0}" />

      <button type="button" class="small-btn remove-item-btn" onclick="removeEditorRow(this)">刪除此品項</button>
    </div>
  `;
}

function createDrinkRowHtml(item = null){
  const drinkOptions = MENU.drinks.map(d =>
    `<option value="${d.id}" ${item && item.menuId === d.id ? "selected" : ""}>${d.name}</option>`
  ).join("");

  return `
    <div class="editor-row" data-type="drink">
      <label>飲料 / 冰淇淋</label>
      <select class="drink-select" onchange="refreshRowPrice(this.closest('.editor-row'))">
        ${drinkOptions}
      </select>

      <label>價格</label>
      <input class="row-price" type="number" value="${item?.price || 0}" />

      <button type="button" class="small-btn remove-item-btn" onclick="removeEditorRow(this)">刪除此品項</button>
    </div>
  `;
}

function addEditorRow(type, item = null){
  const list = document.getElementById("editor-list");
  if(type === "pizza"){
    list.insertAdjacentHTML("beforeend", createPizzaRowHtml(item));
  } else {
    list.insertAdjacentHTML("beforeend", createDrinkRowHtml(item));
  }
  const rows = list.querySelectorAll(".editor-row");
  const lastRow = rows[rows.length - 1];
  refreshRowPrice(lastRow);
  recalcEditorTotal();
}

function removeEditorRow(btn){
  btn.closest(".editor-row").remove();
  recalcEditorTotal();
}

function refreshRowPrice(row){
  const type = row.dataset.type;

  if(type === "pizza"){
    const pizzaId = row.querySelector(".pizza-select").value;
    const size = row.querySelector(".pizza-size").value;
    const pizza = MENU.pizzas.find(p => p.id === pizzaId);
    const price = size === "方形" ? pizza.square : pizza.round;
    row.querySelector(".row-price").value = price;
  }

  if(type === "drink"){
    const drinkId = row.querySelector(".drink-select").value;
    const drink = MENU.drinks.find(d => d.id === drinkId);
    row.querySelector(".row-price").value = drink.price;
  }

  recalcEditorTotal();
}

function recalcEditorTotal(){
  const rows = document.querySelectorAll("#editor-list .editor-row");
  let total = 0;
  rows.forEach(row => {
    total += Number(row.querySelector(".row-price").value || 0);
  });
  document.getElementById("editor-total").innerText = formatMoney(total);
}

async function openEditModal(id){
  currentEditingId = id;
  const res = await adminFetch("/order/" + id);
  const order = await res.json();

  const list = document.getElementById("editor-list");
  list.innerHTML = "";
  document.getElementById("edit-order-type").value = order.orderType || "內用";

  (order.items || []).forEach(item => {
    const pizza = MENU.pizzas.find(p => p.name === item.name);
    const drink = MENU.drinks.find(d => d.name === item.name);

    if(pizza){
      addEditorRow("pizza", {
        menuId: pizza.id,
        size: item.size,
        price: item.price
      });
    } else if(drink){
      addEditorRow("drink", {
        menuId: drink.id,
        price: item.price
      });
    }
  });

  document.getElementById("modal-bg").style.display = "flex";
  recalcEditorTotal();
}

function closeModal(){
  document.getElementById("modal-bg").style.display = "none";
  document.getElementById("editor-list").innerHTML = "";
  currentEditingId = null;
}

async function saveEdit(){
  const rows = document.querySelectorAll("#editor-list .editor-row");
  if(rows.length === 0){
    alert("訂單不可為空");
    return;
  }

  const orderType = document.getElementById("edit-order-type").value;
  const items = [];

  rows.forEach(row => {
    const type = row.dataset.type;
    const price = Number(row.querySelector(".row-price").value || 0);

    if(type === "pizza"){
      const pizzaId = row.querySelector(".pizza-select").value;
      const size = row.querySelector(".pizza-size").value;
      const pizza = MENU.pizzas.find(p => p.id === pizzaId);

      items.push({
        name: pizza.name,
        size,
        price
      });
    }

    if(type === "drink"){
      const drinkId = row.querySelector(".drink-select").value;
      const drink = MENU.drinks.find(d => d.id === drinkId);

      items.push({
        name: drink.name,
        size: "單品",
        price
      });
    }
  });

  const res = await adminFetch("/update-order/" + currentEditingId, {
    method: "POST",
    body: JSON.stringify({ items, orderType })
  });

  const data = await res.json();
  if(!res.ok){
    alert(data.error || "修改失敗");
    return;
  }

  closeModal();
  loadOrders();
}

// ===== 商品管理 =====
function getProductFormData() {
  return {
    name: document.getElementById("product-name").value.trim(),
    category: document.getElementById("product-category").value,
    description: document.getElementById("product-description").value.trim(),
    price: document.getElementById("product-price").value,
    price_square: document.getElementById("product-price-square").value,
    price_round: document.getElementById("product-price-round").value,
    sort_order: document.getElementById("product-sort-order").value,
    is_active: document.getElementById("product-is-active").checked
  };
}

function resetProductForm() {
  editingProductId = null;
  document.getElementById("product-name").value = "";
  document.getElementById("product-description").value = "";
  document.getElementById("product-price").value = "";
  document.getElementById("product-price-square").value = "";
  document.getElementById("product-price-round").value = "";
  document.getElementById("product-sort-order").value = "";
  document.getElementById("product-is-active").checked = true;
}

async function loadAdminProducts() {
  try {
    const res = await adminFetch("/admin/products");
    const rows = await res.json();
    const body = document.getElementById("product-table-body");

    if (!rows.length) {
      body.innerHTML = `<tr><td colspan="7">目前沒有商品</td></tr>`;
      return;
    }

    body.innerHTML = rows.map(row => `
      <tr>
        <td>${row.name || ""}</td>
        <td>${row.category || ""}</td>
        <td>${row.category === "pizza" ? `方 ${row.price_square ?? "-"} / 圓 ${row.price_round ?? "-"}` : `${row.price ?? "-"}`}</td>
        <td>${row.description || ""}</td>
        <td>${row.sort_order ?? 0}</td>
        <td>${row.is_active ? "上架" : "下架"}</td>
        <td>
          <button onclick='editProduct(${JSON.stringify(row).replace(/'/g, "&apos;")})'>編輯</button>
          <button onclick="toggleProduct('${row.id}', ${row.is_active ? "false" : "true"})">${row.is_active ? "下架" : "上架"}</button>
          <button onclick="deleteProduct('${row.id}')">刪除</button>
        </td>
      </tr>
    `).join("");
  } catch (err) {
    console.error("載入商品失敗", err);
    alert("載入商品失敗");
  }
}

function editProduct(row) {
  editingProductId = row.id;
  document.getElementById("product-name").value = row.name || "";
  document.getElementById("product-category").value = row.category || "";
  document.getElementById("product-description").value = row.description || "";
  document.getElementById("product-price").value = row.price ?? "";
  document.getElementById("product-price-square").value = row.price_square ?? "";
  document.getElementById("product-price-round").value = row.price_round ?? "";
  document.getElementById("product-sort-order").value = row.sort_order ?? "";
  document.getElementById("product-is-active").checked = !!row.is_active;
}

async function saveProduct() {
  try {
    const payload = getProductFormData();

    const url = editingProductId
      ? `/admin/products/${editingProductId}`
      : "/admin/products";

    const method = editingProductId ? "PUT" : "POST";

    const res = await adminFetch(url, {
      method,
      body: JSON.stringify(payload)
    });

    const data = await res.json();
    if (!res.ok) {
      alert(data.error || "儲存失敗");
      return;
    }

    alert(editingProductId ? "商品已更新" : "商品已新增");
    resetProductForm();
    loadAdminProducts();
  } catch (err) {
    console.error("儲存商品失敗", err);
    alert("儲存商品失敗");
  }
}

async function toggleProduct(id, nextState) {
  try {
    const res = await adminFetch(`/admin/products/${id}/toggle`, {
      method: "PATCH",
      body: JSON.stringify({ is_active: nextState })
    });

    const data = await res.json();
    if (!res.ok) {
      alert(data.error || "切換失敗");
      return;
    }

    loadAdminProducts();
  } catch (err) {
    console.error("切換商品狀態失敗", err);
    alert("切換商品狀態失敗");
  }
}

async function deleteProduct(id) {
  if (!confirm("確定要刪除這個商品？")) return;

  try {
    const res = await adminFetch(`/admin/products/${id}`, {
      method: "DELETE"
    });

    const data = await res.json();
    if (!res.ok) {
      alert(data.error || "刪除失敗");
      return;
    }

    if (editingProductId === id) {
      resetProductForm();
    }

    loadAdminProducts();
  } catch (err) {
    console.error("刪除商品失敗", err);
    alert("刪除商品失敗");
  }
}

// ===== 分類管理 =====
function resetCategoryForm() {
  editingCategoryId = null;
  document.getElementById("category-name").value = "";
  document.getElementById("category-slug").value = "";
  document.getElementById("category-sort-order").value = "";
  document.getElementById("category-is-active").checked = true;
}

function getCategoryFormData() {
  return {
    name: document.getElementById("category-name").value.trim(),
    slug: document.getElementById("category-slug").value.trim().toLowerCase(),
    sort_order: document.getElementById("category-sort-order").value,
    is_active: document.getElementById("category-is-active").checked
  };
}

async function loadAdminCategories() {
  try {
    const res = await adminFetch("/admin/categories");
    const rows = await res.json();
    adminCategories = rows || [];

    const body = document.getElementById("category-table-body");
    const select = document.getElementById("product-category");

    if (select) {
      select.innerHTML = adminCategories
        .filter(row => row.is_active)
        .map(row => `<option value="${row.slug}">${row.name}</option>`)
        .join("");
    }

    if (!adminCategories.length) {
      body.innerHTML = `<tr><td colspan="5">目前沒有分類</td></tr>`;
      return;
    }

    body.innerHTML = adminCategories.map(row => `
      <tr>
        <td>${row.name}</td>
        <td>${row.slug}</td>
        <td>${row.sort_order ?? 0}</td>
        <td>${row.is_active ? "啟用" : "停用"}</td>
        <td>
          <button onclick='editCategory(${JSON.stringify(row).replace(/'/g, "&apos;")})'>編輯</button>
          <button onclick="deleteCategory('${row.id}')">刪除</button>
        </td>
      </tr>
    `).join("");
  } catch (err) {
    console.error("載入分類失敗", err);
    alert("載入分類失敗");
  }
}

function editCategory(row) {
  editingCategoryId = row.id;
  document.getElementById("category-name").value = row.name || "";
  document.getElementById("category-slug").value = row.slug || "";
  document.getElementById("category-sort-order").value = row.sort_order ?? "";
  document.getElementById("category-is-active").checked = !!row.is_active;
}

async function saveCategory() {
  try {
    const payload = getCategoryFormData();

    const url = editingCategoryId
      ? `/admin/categories/${editingCategoryId}`
      : "/admin/categories";

    const method = editingCategoryId ? "PUT" : "POST";

    const res = await adminFetch(url, {
      method,
      body: JSON.stringify(payload)
    });

    const data = await res.json();
    if (!res.ok) {
      alert(data.error || "儲存失敗");
      return;
    }

    alert(editingCategoryId ? "分類已更新" : "分類已新增");
    resetCategoryForm();
    loadAdminCategories();
  } catch (err) {
    console.error("儲存分類失敗", err);
    alert("儲存分類失敗");
  }
}

async function deleteCategory(id) {
  if (!confirm("確定刪除分類？")) return;

  try {
    const res = await adminFetch(`/admin/categories/${id}`, {
      method: "DELETE"
    });

    const data = await res.json();
    if (!res.ok) {
      alert(data.error || "刪除失敗");
      return;
    }

    loadAdminCategories();
  } catch (err) {
    console.error("刪除分類失敗", err);
    alert("刪除分類失敗");
  }
}

loadOrders();
loadAdminCategories();
loadAdminProducts();
setInterval(loadOrders, 2000);
</script>
