<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>PURO POS 後台</title>

<style>

body{
  font-family:sans-serif;
  margin:0;
  background:#f5f5f5;
}

.wrap{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

h1{
  margin:0 0 10px;
}

.topbar{
  display:flex;
  gap:10px;
  margin-bottom:15px;
}

.btn{
  padding:10px 16px;
  border-radius:8px;
  border:none;
  background:black;
  color:white;
  cursor:pointer;
}

.section{
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

.order{
  border-bottom:1px solid #eee;
  padding:10px 0;
}

.price{
  color:#c95a00;
  font-weight:bold;
}

</style>

</head>
<body>

<div class="wrap">

<h1>PURO POS 後台</h1>

<div class="topbar">

<button class="btn" onclick="loadOrders()">刷新</button>

<a href="/order.html" target="_blank">
<button class="btn">客人點餐頁</button>
</a>

<a href="/report.html" target="_blank">
<button class="btn">銷售報表</button>
</a>

<button class="btn" onclick="createTest()">建立測試訂單</button>

</div>


<div class="section">

<h2>未收款</h2>

<div id="pending"></div>

</div>


<div class="section">

<h2>製作中 (前4單)</h2>

<div id="making"></div>

</div>


<div class="section">

<h2>排隊中</h2>

<div id="waiting"></div>

</div>


<div class="section">

<h2>完成</h2>

<div id="done"></div>

</div>


</div>



<script>


async function loadOrders(){

  const res = await fetch("/orders")
  const orders = await res.json()

  const pending = document.getElementById("pending")
  const making = document.getElementById("making")
  const waiting = document.getElementById("waiting")
  const done = document.getElementById("done")

  pending.innerHTML=""
  making.innerHTML=""
  waiting.innerHTML=""
  done.innerHTML=""


  orders.forEach(o=>{

    const div = document.createElement("div")
    div.className="order"

    const items = (o.items||[])
      .map(i=>`${i.name} ${i.size} $${i.price}`)
      .join("<br>")


    div.innerHTML = `

      <b>${o.id}</b><br>

      ${items}<br>

      <span class="price">$${o.price}</span><br>

    `


    if(o.status=="pending"){

      div.innerHTML += `
      <button onclick="pay('${o.id}')">收款</button>
      `

      pending.appendChild(div)

    }


    else if(o.status=="making"){

      div.innerHTML += `
      <button onclick="doneOrder('${o.id}')">完成</button>
      `

      making.appendChild(div)

    }


    else if(o.status=="waiting"){

      waiting.appendChild(div)

    }


    else if(o.status=="done"){

      done.appendChild(div)

    }

  })

}


async function pay(id){

  await fetch("/pay/"+id,{method:"POST"})
  loadOrders()

}


async function doneOrder(id){

  await fetch("/done/"+id,{method:"POST"})
  loadOrders()

}


async function createTest(){

  await fetch("/order",{

    method:"POST",

    headers:{
      "Content-Type":"application/json"
    },

    body:JSON.stringify({

      items:[
        {name:"測試Pizza",size:"圓形",price:200}
      ],

      price:200

    })

  })

  loadOrders()

}



loadOrders()

setInterval(loadOrders,2000)


</script>

</body>
</html>
