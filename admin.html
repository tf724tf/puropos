<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PURO POS 後台</title>
<style>
body{font-family:sans-serif;margin:0;background:#f5f5f5;}
.wrap{max-width:1200px;margin:auto;padding:20px;}
h1{margin:0 0 10px;}
.topbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:15px;}
.btn{padding:14px 20px;border-radius:10px;border:none;background:black;color:white;cursor:pointer;font-size:20px;font-weight:700;}
.section{background:white;padding:20px;border-radius:16px;margin-bottom:18px;}
.order{border-bottom:1px solid #eee;padding:14px 0;}
.order:last-child{border-bottom:none;}
.order-id{font-size:22px;font-weight:800;margin-bottom:8px;}
.item-line{margin:4px 0;font-size:18px;}
.meta-line{font-size:16px;color:#555;margin:6px 0;}
.price{color:#c95a00;font-weight:bold;font-size:28px;margin:10px 0;}
.action-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:12px;}
.pay-btn,.done-btn,.delete-btn,.edit-btn{
  border:none;border-radius:14px;cursor:pointer;min-width:180px;
  padding:18px 24px;font-size:26px;font-weight:800;
}
.pay-btn{background:#1f9d55;color:white;}
.done-btn{background:#2563eb;color:white;}
.delete-btn{background:#dc2626;color:white;}
.edit-btn{background:#f59e0b;color:white;}
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,0.45);
  display:none;align-items:center;justify-content:center;z-index:9999;
}
.modal{
  width:min(900px,92vw);max-height:90vh;overflow:auto;
  background:white;border-radius:18px;padding:20px;
}
.editor-row{
  border:1px solid #ddd;border-radius:12px;padding:12px;margin-bottom:12px;
}
.editor-row select,.editor-row input{
  width:100%;padding:12px;margin:6px 0;font-size:16px;border:1px solid #ccc;border-radius:10px;
}
.editor-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;}
.small-btn{
  padding:10px 14px;border:none;border-radius:10px;cursor:pointer;
  background:black;color:white;font-size:16px;font-weight:700;
}
.remove-item-btn{background:#dc2626;}
.total-box{font-size:28px;font-weight:900;color:#c95a00;margin-top:12px;}
.empty-text{color:#777;font-size:18px;padding:8px 0;}
.pay-calc{
  border:1px solid #ddd;
  border-radius:12px;
  padding:14px;
  margin-top:12px;
  background:#fafafa;
}
.pay-calc input, .pay-calc select{
  width:100%;
  box-sizing:border-box;
  padding:12px;
  margin-top:8px;
  margin-bottom:12px;
  font-size:18px;
  border:1px solid #ccc;
  border-radius:10px;
}
.pay-calc .calc-result{
  font-size:22px;
  font-weight:800;
  color:#c95a00;
  margin-bottom:12px;
}
</style>
</head>
<body>

<div class="wrap">
  <div class="topbar">
    <button type="button" class="btn" onclick="logout()">登出</button>
    <button type="button" class="btn" onclick="loadOrders(true)">刷新</button>
    <a href="/order.html" target="_blank"><button type="button" class="btn">客人點餐頁</button></a>
    <a href="/report.html" target="_blank"><button type="button" class="btn">銷售報表</button></a>
  </div>

  <h1>PURO POS 後台</h1>

  <div class="section">
    <h2>未收款</h2>
    <div id="pending"></div>
  </div>

  <div class="section">
    <h2>製作中（前4單）</h2>
    <div id="making"></div>
  </div>

  <div class="section">
    <h2>排隊中</h2>
    <div id="waiting"></div>
  </div>

  <div class="section">
    <h2>完成（僅今日）</h2>
    <div id="done"></div>
  </div>
</div>

<div id="modal-bg" class="modal-bg">
  <div class="modal">
    <h3>修改訂單</h3>
    <label>內用 / 外帶</label>
    <select id="edit-order-type">
      <option value="內用">內用</option>
      <option value="外帶">外帶</option>
    </select>

    <div id="editor-list"></div>
    <div class="editor-actions">
      <button type="button" class="small-btn" onclick="addEditorRow('pizza')">+ 加 Pizza</button>
      <button type="button" class="small-btn" onclick="addEditorRow('drink')">+ 加 飲料/冰淇淋</button>
      <button type="button" class="small-btn" onclick="saveEdit()">儲存修改</button>
      <button type="button" class="small-btn" onclick="closeModal()">取消</button>
    </div>
    <div class="total-box">總價：<span id="editor-total">$0</span></div>
  </div>
</div>

<div id="pay-modal-bg" class="modal-bg">
  <div class="modal">
    <h3>收款計算</h3>
    <div class="pay-calc">
      <div>訂單金額</div>
      <input id="pay-order-total" type="number" readonly />

      <div>實收金額</div>
      <input id="pay-paid-amount" type="number" placeholder="請輸入收多少" oninput="updateChange()" />

      <div class="calc-result">找零：<span id="pay-change-result">$0</span></div>

      <div class="editor-actions">
        <button type="button" class="small-btn" onclick="confirmPay()">確認收款</button>
        <button type="button" class="small-btn" onclick="closePayModal()">取消</button>
      </div>
    </div>
  </div>
</div>

<script src="/menu.js"></script>
<script>
const ADMIN_TOKEN = sessionStorage.getItem("admin_auth_token");

if (!ADMIN_TOKEN) {
  window.location.href = "/admin-login.html";
}

const MENU = window.PURO_MENU;
let currentEditingId = null;
let currentPayId = null;
let currentPayTotal = 0;

async function adminFetch(url, options = {}) {
  const finalOptions = {
    ...options,
    headers: {
      ...(options.headers || {}),
      "x-admin-token": ADMIN_TOKEN
    }
  };

  const res = await fetch(url, finalOptions);

  if (res.status === 401) {
    sessionStorage.removeItem("admin_auth_token");
    window.location.href = "/admin-login.html";
    throw new Error("未授權");
  }

  return res;
}

function logout() {
  sessionStorage.removeItem("admin_auth_token");
  window.location.href = "/admin-login.html";
}

function renderItems(items){
  return (items || []).map(i => `<div class="item-line">${i.name} ${i.size} $${i.price}</div>`).join("");
}

function buildOrderHtml(o, type){
  let buttons = "";
  if(type === "pending"){
    buttons = `
      <div class="action-row">
        <button type="button" class="pay-btn" onclick="openPayModal('${o.id}', ${o.price})">💰 收款</button>
        <button type="button" class="edit-btn" onclick="openEditModal('${o.id}')">✏️ 修改</button>
        <button type="button" class="delete-btn" onclick="deleteOrder('${o.id}')">🗑 刪除</button>
      </div>
    `;
  }
  if(type === "making"){
    buttons = `
      <div class="action-row">
        <button type="button" class="done-btn" onclick="doneOrder('${o.id}')">✅ 完成</button>
      </div>
    `;
  }
  return `
    <div class="order">
      <div class="order-id">${o.id}</div>
      <div class="meta-line">類型：${o.orderType || "內用"}</div>
      ${renderItems(o.items)}
      <div class="price">$${o.price || 0}</div>
      ${buttons}
    </div>
  `;
}

function getTodayStart() {
  const d = new Date();
  d.setHours(0,0,0,0);
  return d.getTime();
}

async function loadOrders(showMessage = false){
  try {
    const res = await adminFetch("/orders?_t=" + Date.now(), { cache: "no-store" });
    const orders = await res.json();

    const todayStart = getTodayStart();

    const pendingOrders = orders
      .filter(o => o.status === "pending")
      .sort((a, b) => a.createdAt - b.createdAt);

    const makingOrders = orders
      .filter(o => o.status === "making")
      .sort((a, b) => a.createdAt - b.createdAt);

    const waitingOrders = orders
      .filter(o => o.status === "waiting")
      .sort((a, b) => a.createdAt - b.createdAt);

    const doneOrders = orders
      .filter(o => o.status === "done" && (o.completedAt || 0) >= todayStart)
      .sort((a, b) => (b.completedAt || 0) - (a.completedAt || 0));

    document.getElementById("pending").innerHTML =
      pendingOrders.length ? pendingOrders.map(o => buildOrderHtml(o, "pending")).join("") : `<div class="empty-text">目前沒有未收款訂單</div>`;

    document.getElementById("making").innerHTML =
      makingOrders.length ? makingOrders.map(o => buildOrderHtml(o, "making")).join("") : `<div class="empty-text">目前沒有製作中訂單</div>`;

    document.getElementById("waiting").innerHTML =
      waitingOrders.length ? waitingOrders.map(o => buildOrderHtml(o, "waiting")).join("") : `<div class="empty-text">目前沒有排隊中訂單</div>`;

    document.getElementById("done").innerHTML =
      doneOrders.length ? doneOrders.map(o => buildOrderHtml(o, "done")).join("") : `<div class="empty-text">今天還沒有完成訂單</div>`;

    if (showMessage) console.log("已刷新");
  } catch (err) {
    console.error("刷新失敗", err);
    alert("刷新失敗，請稍後再試");
  }
}

function openPayModal(id, total){
  currentPayId = id;
  currentPayTotal = Number(total || 0);
  document.getElementById("pay-order-total").value = currentPayTotal;
  document.getElementById("pay-paid-amount").value = "";
  document.getElementById("pay-change-result").innerText = "$0";
  document.getElementById("pay-modal-bg").style.display = "flex";
}

function closePayModal(){
  document.getElementById("pay-modal-bg").style.display = "none";
  currentPayId = null;
  currentPayTotal = 0;
}

function updateChange(){
  const paid = Number(document.getElementById("pay-paid-amount").value || 0);
  const change = Math.max(0, paid - currentPayTotal);
  document.getElementById("pay-change-result").innerText = "$" + change;
}

async function confirmPay(){
  const paidAmount = Number(document.getElementById("pay-paid-amount").value || 0);

  if (!paidAmount || paidAmount < currentPayTotal) {
    alert("收款金額不足");
    return;
  }

  const res = await adminFetch("/pay/" + currentPayId, {
    method:"POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ paidAmount })
  });

  const data = await res.json();
  if (!res.ok) {
    alert(data.error || "收款失敗");
    return;
  }

  closePayModal();
  loadOrders();
}

async function doneOrder(id){
  await adminFetch("/done/" + id, { method:"POST" });
  loadOrders();
}

async function deleteOrder(id){
  const reason = prompt("請輸入刪除原因（必填）", "");
  if (reason === null) return;
  const finalReason = reason.trim();
  if (!finalReason) {
    alert("刪單一定要填原因");
    return;
  }

  await adminFetch("/delete/" + id, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ reason: finalReason })
  });

  loadOrders();
}

function createPizzaRowHtml(item = null){
  const pizzaOptions = MENU.pizzas.map(p =>
    `<option value="${p.id}" ${item && item.menuId === p.id ? "selected" : ""}>${p.name}</option>`
  ).join("");

  const size = item?.size || "方形";

  return `
    <div class="editor-row" data-type="pizza">
      <label>Pizza 口味</label>
      <select class="pizza-select" onchange="refreshRowPrice(this.closest('.editor-row'))">
        ${pizzaOptions}
      </select>

      <label>尺寸</label>
      <select class="pizza-size" onchange="refreshRowPrice(this.closest('.editor-row'))">
        <option value="方形" ${size === "方形" ? "selected" : ""}>方形 (15×24CM)</option>
        <option value="圓形" ${size === "圓形" ? "selected" : ""}>圓形 (9吋)</option>
      </select>

      <label>價格</label>
      <input class="row-price" type="number" value="${item?.price || 0}" />

      <button type="button" class="small-btn remove-item-btn" onclick="removeEditorRow(this)">刪除此品項</button>
    </div>
  `;
}

function createDrinkRowHtml(item = null){
  const drinkOptions = MENU.drinks.map(d =>
    `<option value="${d.id}" ${item && item.menuId === d.id ? "selected" : ""}>${d.name}</option>`
  ).join("");

  return `
    <div class="editor-row" data-type="drink">
      <label>飲料 / 冰淇淋</label>
      <select class="drink-select" onchange="refreshRowPrice(this.closest('.editor-row'))">
        ${drinkOptions}
      </select>

      <label>價格</label>
      <input class="row-price" type="number" value="${item?.price || 0}" />

      <button type="button" class="small-btn remove-item-btn" onclick="removeEditorRow(this)">刪除此品項</button>
    </div>
  `;
}

function addEditorRow(type, item = null){
  const list = document.getElementById("editor-list");
  if(type === "pizza"){
    list.insertAdjacentHTML("beforeend", createPizzaRowHtml(item));
  } else {
    list.insertAdjacentHTML("beforeend", createDrinkRowHtml(item));
  }

  const rows = list.querySelectorAll(".editor-row");
  const lastRow = rows[rows.length - 1];
  refreshRowPrice(lastRow);
  recalcEditorTotal();
}

function removeEditorRow(btn){
  btn.closest(".editor-row").remove();
  recalcEditorTotal();
}

function refreshRowPrice(row){
  const type = row.dataset.type;

  if(type === "pizza"){
    const pizzaId = row.querySelector(".pizza-select").value;
    const size = row.querySelector(".pizza-size").value;
    const pizza = MENU.pizzas.find(p => p.id === pizzaId);
    const price = size === "方形" ? pizza.square : pizza.round;
    row.querySelector(".row-price").value = price;
  }

  if(type === "drink"){
    const drinkId = row.querySelector(".drink-select").value;
    const drink = MENU.drinks.find(d => d.id === drinkId);
    row.querySelector(".row-price").value = drink.price;
  }

  recalcEditorTotal();
}

function recalcEditorTotal(){
  const rows = document.querySelectorAll("#editor-list .editor-row");
  let total = 0;
  rows.forEach(row => {
    total += Number(row.querySelector(".row-price").value || 0);
  });
  document.getElementById("editor-total").innerText = "$" + total;
}

async function openEditModal(id){
  currentEditingId = id;
  const res = await adminFetch("/order/" + id);
  const order = await res.json();

  const list = document.getElementById("editor-list");
  list.innerHTML = "";
  document.getElementById("edit-order-type").value = order.orderType || "內用";

  (order.items || []).forEach(item => {
    const pizza = MENU.pizzas.find(p => p.name === item.name);
    const drink = MENU.drinks.find(d => d.name === item.name);

    if(pizza){
      addEditorRow("pizza", {
        menuId: pizza.id,
        size: item.size,
        price: item.price
      });
    } else if(drink){
      addEditorRow("drink", {
        menuId: drink.id,
        price: item.price
      });
    }
  });

  document.getElementById("modal-bg").style.display = "flex";
  recalcEditorTotal();
}

function closeModal(){
  document.getElementById("modal-bg").style.display = "none";
  document.getElementById("editor-list").innerHTML = "";
  currentEditingId = null;
}

async function saveEdit(){
  const rows = document.querySelectorAll("#editor-list .editor-row");
  if(rows.length === 0){
    alert("訂單不可為空");
    return;
  }

  const orderType = document.getElementById("edit-order-type").value;
  const items = [];

  rows.forEach(row => {
    const type = row.dataset.type;
    const price = Number(row.querySelector(".row-price").value || 0);

    if(type === "pizza"){
      const pizzaId = row.querySelector(".pizza-select").value;
      const size = row.querySelector(".pizza-size").value;
      const pizza = MENU.pizzas.find(p => p.id === pizzaId);

      items.push({
        name: pizza.name,
        size,
        price
      });
    }

    if(type === "drink"){
      const drinkId = row.querySelector(".drink-select").value;
      const drink = MENU.drinks.find(d => d.id === drinkId);

      items.push({
        name: drink.name,
        size: "單品",
        price
      });
    }
  });

  const res = await adminFetch("/update-order/" + currentEditingId, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ items, orderType })
  });

  const data = await res.json();
  if(!res.ok){
    alert(data.error || "修改失敗");
    return;
  }

  closeModal();
  loadOrders();
}

loadOrders();
setInterval(loadOrders, 2000);
</script>

</body>
</html>
