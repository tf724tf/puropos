<!DOCTYPE html>
<html>
<head>
  <title>PURO POS</title>

  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
    }

    button {
      font-size: 24px;
      padding: 16px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
      width: 100%;
    }

    .pay-btn {
      background-color: #28a745;
      color: white;
    }

    .done-btn {
      background-color: #007bff;
      color: white;
    }

    .card {
      padding: 20px;
      margin: 20px 0;
      border: 2px solid #ddd;
      border-radius: 12px;
    }

    .price {
      font-size: 22px;
      font-weight: 700;
      color: #c24d00;
      margin: 8px 0 12px;
    }

    .item-line {
      margin: 4px 0;
      color: #333;
    }
  </style>
</head>

<body>
<div style="margin-bottom:16px;">
  <a href="/report.html" target="_blank" style="font-size:20px; text-decoration:none;">
    📊 查看銷售報表 / 歷史交易
  </a>
</div>
<h1 id="status">🟢 正常</h1>

<h2>🧾 未收款</h2>
<div id="pending"></div>

<h2>🔥 製作中（前4單）</h2>
<div id="making"></div>

<h2>📋 排隊中</h2>
<div id="waiting"></div>

<script>
async function loadOrders() {
  const res = await fetch("/orders");
  const data = await res.json();

  const total = data.filter(o => o.status !== "done").length;
  const status = document.getElementById("status");

  if (total < 8) {
    status.innerText = "🟢 正常";
    status.style.color = "green";
  } else if (total < 15) {
    status.innerText = "🟡 忙碌中";
    status.style.color = "orange";
  } else {
    status.innerText = "🔴 爆單了（建議延後接單）";
    status.style.color = "red";
  }

  const pending = data.filter(o => o.status === "pending");
  const making = data.filter(o => o.status === "making").slice(0, 4);
  const waiting = data.filter(o => o.status === "waiting");

  const pendingDiv = document.getElementById("pending");
  pendingDiv.innerHTML = "";

  pending.forEach(o => {
    const itemsHtml = (o.items || []).map(item => `
      <div class="item-line">- ${item.name}｜${item.size}｜$${item.price}</div>
    `).join("");

    pendingDiv.innerHTML += `
      <div class="card">
        <h3>${o.id}</h3>
        ${itemsHtml}
        <div class="price">總價：$${o.price || 0}</div>
        <button class="pay-btn" onclick="pay('${o.id}')">💰 收款</button>
      </div>
    `;
  });

  const makingDiv = document.getElementById("making");
  makingDiv.innerHTML = "";

  making.forEach((o, i) => {
    const itemsHtml = (o.items || []).map(item => `
      <div class="item-line">- ${item.name}｜${item.size}</div>
    `).join("");

    makingDiv.innerHTML += `
      <div class="card">
        <h2>#${i+1} ${o.id}</h2>
        ${itemsHtml}
        <div class="price">總價：$${o.price || 0}</div>
        <button class="done-btn" onclick="done('${o.id}')">完成</button>
      </div>
    `;
  });

  const waitingDiv = document.getElementById("waiting");
  waitingDiv.innerHTML = "";

  waiting.forEach((o, i) => {
    waitingDiv.innerHTML += `
      <div class="card">
        <div>${i+1}. ${o.id}</div>
        <div class="price">總價：$${o.price || 0}</div>
      </div>
    `;
  });
}

async function pay(id) {
  await fetch("/pay/" + id, { method: "POST" });
  loadOrders();
}

async function done(id) {
  await fetch("/done/" + id, { method: "POST" });
  loadOrders();
}

setInterval(loadOrders, 2000);
loadOrders();
</script>

</body>
</html>
