<!DOCTYPE html>
<html>
<body>

<h2>後台登入</h2>

<input id="pwd" type="password" placeholder="輸入密碼">
<button onclick="login()">登入</button>

<script>
function login(){
  if(document.getElementById("pwd").value==="0101"){
    sessionStorage.setItem("admin_auth_token","ok");
    location.href="/admin.html";
  }else{
    alert("錯誤");
  }
}
</script>

</body>
</html>
