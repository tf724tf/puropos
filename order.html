<!DOCTYPE html>
<html>
<body>

<h2>點餐</h2>

<button onclick="type='內用'">內用</button>
<button onclick="type='外帶'">外帶</button>

<h3>Pizza</h3>

<button onclick="add('瑪格莉特','方形',190)">方形 190</button>
<button onclick="add('瑪格莉特','圓形',270)">圓形 270</button>

<h3>購物車</h3>
<div id="cart"></div>
<button onclick="submit()">送出</button>

<script>

let cart=[];
let type=null;

function add(name,size,price){
  cart.push({name,size,price});
  render();
}

function render(){
  document.getElementById("cart").innerHTML=
    cart.map(i=>i.name+" "+i.size+" $"+i.price).join("<br>");
}

async function submit(){

  if(!type) return alert("選內用外帶");

  const total = cart.reduce((s,i)=>s+i.price,0);

  const res = await fetch("/order",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({items:cart,price:total,type})
  });

  const d=await res.json();
  alert("號碼:"+d.id);

  cart=[];
  render();
}

</script>

</body>
</html>
